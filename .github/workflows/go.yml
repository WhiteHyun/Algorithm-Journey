name: Go

on:
  push:
    branches: [main]
    paths:
      - "go/**"
      - ".github/workflows/go.yml"
  pull_request:
    paths:
      - "go/**"
      - ".github/workflows/go.yml"

jobs:
  test:
    name: build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache: false

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -count=1
